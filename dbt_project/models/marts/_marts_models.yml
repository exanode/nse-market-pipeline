version: 2

models:
  - name: fct_daily_prices
    description: >
      Incremental fact table. One row per symbol per trading date.
      Grain: symbol x price_date.
    columns:
      - name: price_key
        description: Surrogate key (MD5 of symbol + price_date)
        tests:
          - not_null
          - unique
      - name: symbol
        tests:
          - not_null
      - name: price_date
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
      - name: run_id
        tests:
          - not_null

  - name: dim_stock
    description: One row per listed symbol
    columns:
      - name: stock_key
        tests:
          - not_null
          - unique
      - name: symbol
        tests:
          - not_null
          - unique
